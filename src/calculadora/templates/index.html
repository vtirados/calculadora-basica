<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <main class="layout">
      <section class="panel">
        <h1>Calculadora en Localhost</h1>
        <p class="subtitle">Realiza operaciones basicas desde tu navegador.</p>

        <form method="post" class="calculator-form">
          <label for="a">Primer numero</label>
          <input id="a" name="a" type="text" value="{{ numero_a or '' }}" required />

          <label for="b">Segundo numero</label>
          <input id="b" name="b" type="text" value="{{ numero_b or '' }}" required />

          <label for="operacion">Operacion</label>
          <select id="operacion" name="operacion" required>
            <option value="sumar" {% if operacion == 'sumar' %}selected{% endif %}>Sumar</option>
            <option value="restar" {% if operacion == 'restar' %}selected{% endif %}>Restar</option>
            <option value="multiplicar" {% if operacion == 'multiplicar' %}selected{% endif %}>Multiplicar</option>
            <option value="dividir" {% if operacion == 'dividir' %}selected{% endif %}>Dividir</option>
          </select>

          <button type="submit">Calcular</button>
        </form>

        {% if resultado is not none %}
        <p class="result">Resultado: <strong>{{ resultado }}</strong></p>
        {% endif %}

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
      </section>
    </main>
  </body>
</html>
